<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw P2P Mesh Dashboard - 去中心化Agent通信網絡</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --bg-panel: #16162a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #2d2d44;
            --glow: rgba(99, 102, 241, 0.5);
            --glow-accent: rgba(236, 72, 153, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景動畫 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 頂部導航 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px var(--glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 10px currentColor;
            transition: all 0.3s ease;
        }

        .status-dot.online {
            background: var(--success);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 主控制面板 */
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* 按鈕樣式 */
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #16a34a);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            background: var(--bg-panel);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 網絡拓撲圖 */
        .network-viz {
            grid-column: 1 / -1;
            height: 400px;
            position: relative;
            overflow: hidden;
        }

        .network-canvas {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: var(--bg-panel);
        }

        .network-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-dot.self { background: var(--accent); }
        .legend-dot.peer { background: var(--success); }
        .legend-dot.offline { background: var(--text-secondary); }

        /* 消息日誌 */
        .log-container {
            background: var(--bg-panel);
            border-radius: 12px;
            padding: 16px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            display: flex;
            gap: 12px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-time {
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .log-type {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .log-type.info { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .log-type.success { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .log-type.warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .log-type.error { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .log-type.msg { background: rgba(236, 72, 153, 0.2); color: var(--accent); }

        .log-content {
            color: var(--text-primary);
            word-break: break-all;
        }

        /* 統計數據 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: var(--bg-panel);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 節點列表 */
        .peer-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .peer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-bottom: 8px;
        }

        .peer-item:hover {
            background: var(--bg-panel);
        }

        .peer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            position: relative;
        }

        .peer-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--bg-card);
            background: var(--success);
        }

        .peer-status.offline {
            background: var(--text-secondary);
        }

        .peer-info {
            flex: 1;
        }

        .peer-name {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .peer-id {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .peer-ping {
            font-size: 12px;
            color: var(--success);
        }

        /* 底部輸入區 */
        .chat-input {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        /* 模態框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-body {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .control-panel {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            
            .network-viz {
                height: 300px;
            }
        }

        /* 滾動條樣式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-panel);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <canvas class="bg-particles" id="bgParticles"></canvas>

    <div class="container">
        <!-- 頂部導航 -->

                <div class="logo-icon">🐯</div>
                <div class="logo-text">
                    <h1>OpenClaw P2P Mesh</h1>

                </div>

            <div class="status-indicator">

        <!-- 主控制面板 -->
        <div class="control-panel">
            <!-- 網絡拓撲圖 -->
            <div class="card network-viz">

                    <div class="card-title">
                        <div class="card-icon">🌐</div>

                </div>
                <canvas class="network-canvas" id="networkCanvas"></canvas>

            <!-- 節點信息 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">💻</div>

                    </div>
                </div>

                    <div class="stat-item">
                        <div class="stat-value" id="msgCount">0</div>

                <div style="background: var(--bg-panel); padding: 16px; border-radius: 12px; margin-bottom: 16px;">
                    <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">本機 ID</div>
                    <div style="font-family: monospace; font-size: 14px; color: var(--primary);">tiger-windows</div>
                </div>

            <!-- 在線節點列表 -->
            <div class="card">

    <!-- 連接節點模態框 -->
    <div class="modal" id="connectModal">
        <div class="modal-content">
            <div class="modal-title">🔗 連接到節點</div>
            <div class="modal-body">
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">節點 ID</label>
                    <input type="text" class="input-field" id="connectId" placeholder="例如: tiger-macbook">

                </div>

            <div class="modal-footer">

    <!-- 廣播消息模態框 -->

        <div class="modal-content">

                    <label style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">消息内容</label>
                    <input type="text" class="input-field" id="broadcastMsg" placeholder="輸入要廣播的消息...">

                    消息將通過 UDP 廣播發送到網絡中的所有發現節點。

            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('broadcastModal')">取消</button>
                <button class="btn btn-primary" onclick="sendBroadcast()">廣播</button>
            </div>
        </div>
    </div>

    <script>
        // P2P 狀態管理
        let isRunning = false;
        let peers = new Map();
        let messageCount = 0;
        let logs = [];
        let networkAnimationId = null;
        
        // 本機信息
        const myId = 'tiger-windows';
        const myAlias = 'Windows主控';
        const udpPort = 19876;

        // 背景粒子動畫
        function initBackgroundParticles() {
            const canvas = document.getElementById('bgParticles');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1,
                    opacity: Math.random() * 0.5 + 0.1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(99, 102, 241, ${p.opacity})`;
                    ctx.fill();
                });

                // 連接附近的粒子
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 100) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * (1 - dist / 100)})`;
                            ctx.stroke();
                        }
                    });
                });

                requestAnimationFrame(animate);
            }
            animate();
        }

        // 網絡拓撲圖動畫
        function initNetworkVisualization() {
            const canvas = document.getElementById('networkCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            let nodes = [];
            let connections = [];
            let angle = 0;

            function updateNodes() {
                // 本機節點
                nodes = [{
                    id: myId,
                    alias: myAlias,
                    x: centerX,
                    y: centerY,
                    isSelf: true,
                    color: '#ec4899'
                }];

                // 添加其他節點
                let i = 0;
                peers.forEach((peer, id) => {
                    const peerAngle = (i / Math.max(peers.size, 1)) * Math.PI * 2 + angle;
                    const radius = 120;
                    nodes.push({
                        id: id,
                        alias: peer.alias,
                        x: centerX + Math.cos(peerAngle) * radius,
                        y: centerY + Math.sin(peerAngle) * radius,
                        isSelf: false,
                        color: '#22c55e'
                    });
                    i++;
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 繪製連接線
                nodes.slice(1).forEach(node => {
                    const gradient = ctx.createLinearGradient(node.x, node.y, centerX, centerY);
                    gradient.addColorStop(0, node.color);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.beginPath();
                    ctx.moveTo(node.x, node.y);
                    ctx.lineTo(centerX, centerY);
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // 數據流動效果
                    if (isRunning) {
                        const flowOffset = (Date.now() / 1000) % 1;
                        const fx = node.x + (centerX - node.x) * flowOffset;
                        const fy = node.y + (centerY - node.y) * flowOffset;
                        
                        ctx.beginPath();
                        ctx.arc(fx, fy, 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#6366f1';
                        ctx.fill();
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#6366f1';
                    }
                });
                ctx.shadowBlur = 0;

                // 繪製節點
                nodes.forEach(node => {
                    // 光暈
                    const gradient = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, 30);
                    gradient.addColorStop(0, node.color + '40');
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, 30, 0, Math.PI * 2);
                    ctx.fill();

                    // 節點圓
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, node.isSelf ? 25 : 20, 0, Math.PI * 2);
                    ctx.fillStyle = node.color;
                    ctx.fill();

                    // 節點邊框
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // 節點標籤
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(node.alias, node.x, node.y + 40);
                    ctx.fillStyle = '#94a3b8';
                    ctx.font = '10px monospace';
                    ctx.fillText(node.id.slice(0, 8) + '...', node.x, node.y + 55);
                });

                angle += 0.001;
                updateNodes();
                networkAnimationId = requestAnimationFrame(draw);
            }

            draw();
        }

        // 日誌系統
        function addLog(type, content) {
            const now = new Date();
            const time = now.toTimeString().slice(0, 8);
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-type ${type}">${type.toUpperCase()}</span>
                <span class="log-content">${content}</span>
            `;
            
            const container = document.getElementById('logContainer');
            container.insertBefore(logEntry, container.firstChild);
            
            // 限制日誌數量
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }

            messageCount++;
            document.getElementById('msgCount').textContent = messageCount;
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            addLog('info', 'Logs cleared.');
        }

        // 更新節點列表
        function updatePeerList() {
            const list = document.getElementById('peerList');
            
            if (peers.size === 0) {
                list.innerHTML = `
                    <div style="text-align: center; color: var(--text-secondary); padding: 40px 0;">
                        等待節點加入...
                    </div>
                `;
                return;
            }

            list.innerHTML = '';
            peers.forEach((peer, id) => {
                const item = document.createElement('div');
                item.className = 'peer-item';
                item.innerHTML = `
                    <div class="peer-avatar">
                        🖥️
                        <div class="peer-status"></div>
                    </div>
                    <div class="peer-info">
                        <div class="peer-name">${peer.alias}</div>
                        <div class="peer-id">${id}</div>
                    </div>
                    <div class="peer-ping">● 在線</div>
                `;
                list.appendChild(item);
            });

            document.getElementById('peerCount').textContent = peers.size;
        }

        // P2P 控制
        async function startP2P() {
            if (isRunning) return;
            
            try {
                // 模擬啟動過程
                addLog('info', 'Initializing P2P Mesh...');
                await delay(500);
                
                addLog('info', 'Creating UDP socket on port 19876...');
                await delay(500);
                
                addLog('success', `P2P Mesh started successfully!`);
                addLog('info', `My ID: ${myId} (${myAlias})`);
                addLog('info', 'Listening for peer announcements...');
                
                isRunning = true;
                updateUI();
                
                // 模擬發現節點
                setTimeout(() => {
                    discoverPeer('tiger-macbook', 'MacBook節點', '192.168.1.100');
                }, 3000);
                
            } catch (error) {
                addLog('error', `Failed to start P2P: ${error.message}`);
            }
        }

        function stopP2P() {
            if (!isRunning) return;
            
            addLog('warning', 'Stopping P2P Mesh...');
            
            isRunning = false;
            peers.clear();
            updateUI();
            updatePeerList();
            
            addLog('info', 'P2P Mesh stopped.');
        }

        function discoverPeer(id, alias, address) {
            if (!isRunning) return;
            
            peers.set(id, { alias, address, lastSeen: Date.now() });
            addLog('success', `Discovered peer: ${alias} (${id})`);
            updatePeerList();
        }

        function updateUI() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            
            if (isRunning) {
                dot.classList.add('online');
                text.textContent = '運行中 (UDP:19876)';
                btnStart.disabled = true;
                btnStop.disabled = false;
            } else {
                dot.classList.remove('online');
                text.textContent = '離線';
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
        }

        // 消息發送
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            
            if (!msg) return;
            if (!isRunning) {
                addLog('error', 'P2P Mesh is not running. Please start first.');
                return;
            }
            
            addLog('msg', `[Broadcast] ${msg}`);
            input.value = '';
        }

        function broadcastMessage() {
            showModal('broadcastModal');
        }

        function sendBroadcast() {
            const input = document.getElementById('broadcastMsg');
            const msg = input.value.trim();
            
            if (!msg) return;
            if (!isRunning) {
                addLog('error', 'P2P Mesh is not running. Please start first.');
                return;
            }
            
            addLog('msg', `[Broadcast] ${msg}`);
            input.value = '';
            closeModal('broadcastModal');
        }

        // 節點連接
        function showConnectModal() {
            showModal('connectModal');
        }

        function connectToPeer() {
            const id = document.getElementById('connectId').value.trim();
            
            if (!id) return;
            if (!isRunning) {
                addLog('error', 'P2P Mesh is not running. Please start first.');
                return;
            }
            
            addLog('info', `Attempting to connect to ${id}...`);
            
            // 模擬連接
            setTimeout(() => {
                discoverPeer(id, 'Unknown Node', '192.168.1.xxx');
                addLog('success', `Connected to ${id}`);
            }, 1000);
            
            document.getElementById('connectId').value = '';
            closeModal('connectModal');
        }

        // 模態框控制
        function showModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // 工具函數
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 鍵盤事件
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('broadcastMsg').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBroadcast();
        });

        document.getElementById('connectId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') connectToPeer();
        });

        // 點擊模態框外部關閉
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initBackgroundParticles();
            initNetworkVisualization();
            addLog('info', 'Dashboard ready. Click "啟動 P2P" to begin.');
        });

        // 窗口關閉時清理
        window.addEventListener('beforeunload', () => {
            if (networkAnimationId) {
                cancelAnimationFrame(networkAnimationId);
            }
        });
    </script>
</body>
</html>
